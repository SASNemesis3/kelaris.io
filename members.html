<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Kelaris Members</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <style>
    :root {
      --text: #f4f7fb;
      --muted: #a9b4c7;
      --accent: #88a8ff;
      --accent-2: #7df0d2;
      --line: rgba(255,255,255,0.12);
      --success: #7df0d2;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: Inter, Arial, sans-serif;
      color: var(--text);
      min-height: 100vh;
      background:
        url("BackgroundCrash.png") center center / cover no-repeat fixed,
        linear-gradient(180deg, #010307 0%, #030814 28%, #050b18 58%, #040710 100%);
    }

    a { color: inherit; text-decoration: none; }

    .shell {
      width: min(1100px, calc(100% - 32px));
      margin: 0 auto;
      padding: 42px 0 70px;
      position: relative;
      z-index: 1;
      overflow: visible;
    }

    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      margin-bottom: 24px;
      padding: 18px 0;
      border-bottom: 1px solid rgba(255,255,255,0.07);
      backdrop-filter: blur(16px);
      position: relative;
      z-index: 1000;
      overflow: visible;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 12px;
      font-weight: 800;
      letter-spacing: 0.14em;
      text-transform: uppercase;
    }

    .brand-mark {
      width: 14px;
      height: 14px;
      border-radius: 999px;
      background: linear-gradient(135deg, var(--accent), var(--accent-2));
    }

    .actions {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      align-items: center;
      position: relative;
      z-index: 1001;
      overflow: visible;
    }

    .button {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 46px;
      padding: 0 16px;
      border-radius: 999px;
      border: 1px solid var(--line);
      background: rgba(255,255,255,0.04);
      color: var(--text);
      font-weight: 700;
      cursor: pointer;
    }

    .button.primary {
      background: linear-gradient(135deg, rgba(136,168,255,0.22), rgba(125,240,210,0.18));
    }

    .profile-menu {
      position: relative;
      display: none;
      z-index: 1002;
    }

    .profile-menu.visible {
      display: block;
    }

    .profile-trigger {
      min-height: 46px;
      padding: 6px 14px 6px 8px;
      border-radius: 999px;
      border: 1px solid rgba(255,255,255,0.12);
      background: rgba(255,255,255,0.05);
      color: var(--text);
      cursor: pointer;
      font-weight: 700;
      display: inline-flex;
      align-items: center;
      gap: 10px;
    }

    .profile-avatar {
      width: 30px;
      height: 30px;
      border-radius: 999px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-size: 0.82rem;
      font-weight: 800;
      letter-spacing: 0.04em;
      color: #08101f;
      background: linear-gradient(135deg, var(--accent), var(--accent-2));
      box-shadow: 0 0 18px rgba(136,168,255,0.28);
      flex: 0 0 30px;
    }

    .profile-trigger-label {
      display: inline-flex;
      align-items: center;
      gap: 6px;
    }

    .profile-dropdown {
      position: absolute;
      top: calc(100% + 10px);
      right: 0;
      width: 280px;
      border-radius: 18px;
      border: 1px solid rgba(255,255,255,0.12);
      background: rgba(8,12,28,0.96);
      backdrop-filter: blur(14px);
      box-shadow: 0 24px 80px rgba(0,0,0,0.45);
      padding: 14px;
      display: none;
      z-index: 9999;
    }

    .profile-dropdown.open {
      display: block;
    }

    .profile-summary {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 12px;
      padding-bottom: 12px;
      border-bottom: 1px solid rgba(255,255,255,0.08);
    }

    .profile-summary .profile-avatar {
      width: 40px;
      height: 40px;
      flex: 0 0 40px;
      font-size: 0.95rem;
    }

    .profile-email-row {
      color: var(--muted);
      font-size: 0.9rem;
      line-height: 1.4;
      word-break: break-word;
    }

    .dropdown-link,
    .dropdown-button {
      display: block;
      width: 100%;
      padding: 10px 12px;
      border-radius: 10px;
      cursor: pointer;
      text-align: left;
      background: transparent;
      border: none;
      color: var(--text);
      font: inherit;
    }

    .dropdown-link:hover,
    .dropdown-button:hover {
      background: rgba(255,255,255,0.06);
    }

    .card {
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 22px;
      padding: 28px;
      margin-bottom: 20px;
      position: relative;
      z-index: 1;
    }

    h1 { margin: 0 0 10px; font-size: 2.5rem; }
    h2 { margin-top: 0; }

    .status-pill {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      padding: 8px 14px;
      border-radius: 999px;
      background: rgba(255,255,255,0.06);
    }

    .status-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: var(--success);
    }

    .info-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
    }

    .info-box {
      padding: 16px;
      border-radius: 12px;
      background: rgba(255,255,255,0.04);
    }

    @media (max-width: 700px) {
      .info-grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
<div class="shell">
  <div class="topbar">
    <div class="brand">
      <div class="brand-mark"></div>
      KELARIS
    </div>

    <div class="actions">
      <a class="button" href="index.html">Home</a>
      <a class="button" href="auth.html">Account</a>

      <div id="profile-menu" class="profile-menu">
        <button id="profile-trigger" class="profile-trigger" type="button">
          <span id="trigger-avatar" class="profile-avatar">U</span>
          <span id="trigger-label" class="profile-trigger-label">Account ▾</span>
        </button>

        <div id="profile-dropdown" class="profile-dropdown">
          <div class="profile-summary">
            <span id="dropdown-avatar" class="profile-avatar">U</span>
            <div id="dropdown-email" class="profile-email-row">Signed in</div>
          </div>
          <a class="dropdown-link" href="auth.html">Account Page</a>
          <button id="dropdown-logout" class="dropdown-button" type="button">Log Out</button>
        </div>
      </div>
    </div>
  </div>

  <div class="card">
    <h1>Member Area</h1>
    <p>This page is protected by login.</p>
    <div class="status-pill">
      <div class="status-dot"></div>
      Signed-in access verified
    </div>
  </div>

  <div class="card">
    <h2>Your Access</h2>
    <div class="info-grid">
      <div class="info-box">
        <strong>Email</strong>
        <div id="profile-email">Loading...</div>
      </div>
      <div class="info-box">
        <strong>User ID</strong>
        <div id="profile-id">Loading...</div>
      </div>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="account.js"></script>
<script>
  window.kelarisRequireAuth();
</script>
</body>
</html>
