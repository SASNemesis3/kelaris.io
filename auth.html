<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Kelaris Account</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    :root {
      --bg: #050816;
      --text: #f4f7fb;
      --muted: #a9b4c7;
      --accent: #88a8ff;
      --accent-2: #7df0d2;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: Inter, Arial, sans-serif;
      color: var(--text);
      min-height: 100vh;

      background:
        url("BackgroundCrash.png") center center / cover no-repeat fixed,
        radial-gradient(circle at 50% -10%, rgba(104,132,255,0.18), transparent 22%),
        radial-gradient(circle at 20% 18%, rgba(136,168,255,0.10), transparent 24%),
        radial-gradient(circle at 82% 12%, rgba(125,240,210,0.06), transparent 18%),
        linear-gradient(180deg, #010307 0%, #030814 28%, #050b18 58%, #040710 100%);
    }

    /* STAR LAYERS (same as main site) */
    .stars,
    .stars::before,
    .stars::after {
      position: fixed;
      inset: 0;
      content: "";
      pointer-events: none;
      z-index: 0;
    }

    .stars {
      background-image:
        radial-gradient(1px 1px at 15% 25%, rgba(255,255,255,0.42) 99%, transparent 100%),
        radial-gradient(1px 1px at 75% 65%, rgba(255,255,255,0.35) 99%, transparent 100%);
      background-size: 512px 512px;
      animation: starsScrollFar 80s linear infinite;
    }

    .stars::before {
      background-image:
        radial-gradient(1.5px 1.5px at 20% 15%, rgba(255,255,255,0.60) 99%, transparent 100%);
      background-size: 400px 400px;
      animation: starsScrollMid 45s linear infinite;
    }

    .stars::after {
      background-image:
        radial-gradient(2px 2px at 30% 20%, rgba(255,255,255,0.95) 99%, transparent 100%);
      background-size: 320px 320px;
      animation: starsScrollNear 22s linear infinite;
    }

    @keyframes starsScrollFar {
      0% { background-position: 0 0; }
      100% { background-position: -20px -1024px; }
    }

    @keyframes starsScrollMid {
      0% { background-position: 0 0; }
      100% { background-position: -40px -768px; }
    }

    @keyframes starsScrollNear {
      0% { background-position: 0 0; }
      100% { background-position: -80px -640px; }
    }

    /* CONTENT */
    .container {
      position: relative;
      z-index: 1;
      max-width: 520px;
      margin: 80px auto;
      padding: 30px;
      border-radius: 16px;
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.1);
      backdrop-filter: blur(12px);
    }

    h1 {
      text-align: center;
      margin-bottom: 30px;
    }

    h2 {
      margin-top: 25px;
    }

    input {
      width: 100%;
      padding: 12px;
      margin: 6px 0;
      border-radius: 8px;
      border: 1px solid rgba(255,255,255,0.1);
      background: rgba(255,255,255,0.05);
      color: white;
    }

    button {
      padding: 10px 16px;
      margin-top: 10px;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      background: linear-gradient(135deg, var(--accent), var(--accent-2));
      color: #000;
      font-weight: bold;
    }

    #message {
      margin-top: 15px;
      font-weight: bold;
    }

    .error { color: #ff6b6b; }
    .success { color: #7df0d2; }
    .info { color: #a9b4c7; }

    #profile {
      margin-top: 25px;
      padding: 15px;
      border: 1px solid rgba(255,255,255,0.1);
      display: none;
      border-radius: 10px;
    }
  </style>
</head>

<body>

<div class="stars"></div>

<div class="container">

  <h1>Kelaris Account</h1>

  <!-- SIGN UP -->
  <h2>Sign Up</h2>
  <form id="signup-form">
    <input id="signup-email" type="email" placeholder="Email" required>
    <input id="signup-password" type="password" placeholder="Password" required>
    <input id="signup-confirm" type="password" placeholder="Confirm Password" required>
    <button type="submit">Create Account</button>
  </form>

  <!-- LOGIN -->
  <h2>Login</h2>
  <form id="login-form">
    <input id="login-email" type="email" placeholder="Email" required>
    <input id="login-password" type="password" placeholder="Password" required>
    <button type="submit">Login</button>
  </form>

  <!-- RESET -->
  <h2>Reset Password</h2>
  <form id="reset-form">
    <input id="reset-email" type="email" placeholder="Email" required>
    <button type="submit">Send Reset</button>
  </form>

  <!-- MESSAGE -->
  <div id="message"></div>

  <!-- PROFILE -->
  <div id="profile">
    <h3>Logged in as:</h3>
    <p id="profile-email"></p>
    <button id="logout">Logout</button>
  </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="account.js"></script>

</body>
</html>
