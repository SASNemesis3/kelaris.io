<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Kelaris Account</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      background: #0b1126;
      color: white;
      font-family: Arial, sans-serif;
      padding: 40px;
    }

    .container {
      max-width: 500px;
      margin: auto;
    }

    h2 {
      margin-top: 30px;
    }

    input {
      width: 100%;
      padding: 10px;
      margin: 6px 0;
      border-radius: 6px;
      border: none;
    }

    button {
      padding: 10px 15px;
      margin-top: 10px;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      background: #4a6cff;
      color: white;
    }

    #message {
      margin-top: 15px;
      font-weight: bold;
    }

    .error { color: #ff6b6b; }
    .success { color: #6bffb0; }

    #profile {
      margin-top: 30px;
      padding: 15px;
      border: 1px solid #444;
      display: none;
    }
  </style>
</head>
<body>

<div class="container">

  <h1>Kelaris Account</h1>

  <!-- SIGN UP -->
  <h2>Sign Up</h2>
  <form id="signup-form">
    <input id="signup-email" type="email" placeholder="Email" required>
    <input id="signup-password" type="password" placeholder="Password" required>
    <input id="signup-confirm" type="password" placeholder="Confirm Password" required>
    <button type="submit">Create Account</button>
  </form>

  <!-- LOGIN -->
  <h2>Login</h2>
  <form id="login-form">
    <input id="login-email" type="email" placeholder="Email" required>
    <input id="login-password" type="password" placeholder="Password" required>
    <button type="submit">Login</button>
  </form>

  <!-- RESET -->
  <h2>Reset Password</h2>
  <form id="reset-form">
    <input id="reset-email" type="email" placeholder="Email" required>
    <button type="submit">Send Reset</button>
  </form>

  <!-- MESSAGE -->
  <div id="message"></div>

  <!-- PROFILE -->
  <div id="profile">
    <h3>Logged in as:</h3>
    <p id="profile-email"></p>
    <button id="logout">Logout</button>
  </div>

</div>

<!-- SUPABASE -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<!-- YOUR SCRIPT -->
<script src="account.js"></script>

</body>
</html>
